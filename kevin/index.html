<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALCON - Dashboard Móvil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --rojo: #e63946; --azul: #2b2d42; --fondo: #f8f9fa; --blanco: #ffffff; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); margin: 0; display: flex; flex-direction: column; color: var(--azul); }

        /* --- BARRA LATERAL ADAPTABLE --- */
        .sidebar { 
            width: 260px; background: var(--blanco); height: 100vh; 
            border-right: 1px solid #ddd; position: fixed; display: flex; flex-direction: column; 
            transition: 0.3s; z-index: 1000;
        }
        .sidebar .logo { padding: 25px; text-align: center; color: var(--rojo); font-size: 22px; font-weight: bold; border-bottom: 1px solid #eee; }
        .sidebar a { padding: 15px 25px; color: var(--azul); text-decoration: none; cursor: pointer; border-left: 5px solid transparent; display: flex; align-items: center; gap: 10px; }
        .sidebar a.active { background: #fff0f1; color: var(--rojo); border-left: 5px solid var(--rojo); font-weight: bold; }

        /* --- CONTENIDO PRINCIPAL --- */
        .main { margin-left: 260px; padding: 20px; width: calc(100% - 260px); transition: 0.3s; }
        .sec { display: none; }
        .sec.active { display: block; }

        /* --- TARJETAS Y CALCULADORA --- */
        .card-calc { background: var(--azul); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .inputs { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        input, select, .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 16px; }
        .btn { background: var(--rojo); color: white; cursor: pointer; font-weight: bold; }
        
        .grid-unidades { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
        }
        .card-u { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .u-img { width: 100%; height: 140px; object-fit: contain; padding: 10px; }

        /* --- CALENDARIO --- */
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-top: 10px; }
        .day { padding: 10px 5px; border: 1px solid #eee; font-size: 12px; text-align: center; cursor: pointer; border-radius: 5px; }
        .day.sel { background: var(--rojo); color: white; }

        /* --- AJUSTES PARA CELULAR (MEDIA QUERY) --- */
        @media (max-width: 768px) {
            .sidebar { 
                width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid #ddd;
            }
            .sidebar .logo { padding: 15px; }
            .sidebar a { padding: 12px; justify-content: center; font-size: 14px; border-left: none; border-bottom: 3px solid transparent; }
            .sidebar a.active { border-left: none; border-bottom: 3px solid var(--rojo); }
            .sidebar { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            
            .main { margin-left: 0; width: 100%; padding: 15px; }
            .grid-unidades { grid-template-columns: 1fr; } /* Un solo camión por fila en el cel */
            
            .inputs { grid-template-columns: 1fr; }
            .tabla { font-size: 12px; } /* Tabla más chiquita para que quepa */
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ALCON</div>
        <a id="n-home" onclick="ir('home')" class="active"><i class="fas fa-home"></i> Inicio</a>
        <a id="n-cal" onclick="ir('cal')"><i class="fas fa-calendar"></i> Agenda</a>
        <a id="n-hist" onclick="ir('hist')"><i class="fas fa-list"></i> Rutas</a>
    </div>

    <div class="main">
        <div id="s-home" class="sec active">
            <div class="card-calc">
                <h3>Cotizador Rápido</h3>
                <div class="inputs">
                    <select id="tarifa">
                        <option value="14.21">Tráiler ($14.21/km)</option>
                        <option value="4.73">Camioneta 3.5T ($4.73/km)</option>
                        <option value="2.96">Camioneta 1.5T ($2.96/km)</option>
                    </select>
                    <input type="text" id="ori" placeholder="Origen">
                    <input type="text" id="des" placeholder="Destino">
                    <button class="btn" onclick="cotizar()">Calcular</button>
                </div>
                <div id="res" style="display:none; padding:15px; background:rgba(255,255,255,0.1); border-radius:10px;">
                    <div id="info"></div>
                    <button class="btn" style="background:#25d366; margin-top:10px;" onclick="enviarWS()">WhatsApp</button>
                </div>
            </div>

            <div class="grid-unidades">
                <div class="card-u">
                    <img src="https://images.unsplash.com/photo-1519003722824-194d4455a60c?w=400" class="u-img">
                    <div style="padding:15px">
                        <strong>Tráiler 53'</strong><br>
                        <button class="btn" style="margin-top:10px;" onclick="agendar('Tráiler')">Agendar</button>
                    </div>
                </div>
                <div class="card-u">
                    <img src="https://th.bing.com/th/id/OIP.nfBs-HTaNVy5UyPM1xw3swHaGC?w=210" class="u-img">
                    <div style="padding:15px">
                        <strong>Camioneta 3.5T</strong><br>
                        <button class="btn" style="margin-top:10px;" onclick="agendar('3.5 Ton')">Agendar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="s-cal" class="sec">
            <h3>Agenda de Viajes</h3>
            <div class="days" id="c-grid"></div>
            <div style="margin-top:15px;">
                <input type="text" id="v-des" placeholder="Destino" style="border: 1px solid #ccc; margin-bottom:5px;">
                <button class="btn" onclick="guardarV()">Confirmar Fecha</button>
            </div>
        </div>

        <div id="s-hist" class="sec">
            <h3>Historial</h3>
            <div id="l-cot" style="background:white; border-radius:10px; padding:10px;"></div>
        </div>
    </div>

    <script>
        // ... (Se mantienen las funciones de cálculo y navegación del código anterior)
        let uni = "", fSel = "26 de Marzo", cAct = null;

        function ir(id) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('s-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }

        async function cotizar() {
            const o = document.getElementById('ori').value, d = document.getElementById('des').value, t = document.getElementById('tarifa').value;
            if(!o || !d) return alert("Faltan datos");
            try {
                const rO = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${o}`), dO = await rO.json();
                const rD = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${d}`), dD = await rD.json();
                const R = 6371;
                const dLat = (dD[0].lat-dO[0].lat)*Math.PI/180, dLon = (dD[0].lon-dO[0].lon)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(dO[0].lat*Math.PI/180)*Math.cos(dD[0].lat*Math.PI/180)*Math.sin(dLon/2)**2;
                let dist = (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1.25; 
                const tot = (dist * t).toFixed(2);
                document.getElementById('res').style.display = 'block';
                document.getElementById('info').innerHTML = `<b>${dist.toFixed(1)} km - $${tot} MXN</b>`;
                cAct = { o, d, tot, dist: dist.toFixed(1) };
            } catch(e) { alert("Error de red"); }
        }

        function enviarWS() {
            const msg = `*ALCON* - Cotización: ${cAct.o} a ${cAct.d} por $${cAct.tot}`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function agendar(n) { uni = n; ir('cal'); render(); }
        function render() {
            const g = document.getElementById('c-grid'); g.innerHTML = "";
            for(let i=1; i<=31; i++) g.innerHTML += `<div class="day ${i===26?'sel':''}" onclick="sel(${i},this)">${i}</div>`;
        }
        function sel(d,e) { document.querySelectorAll('.day').forEach(x=>x.classList.remove('sel')); e.classList.add('sel'); fSel = d+" de Marzo"; }
        function guardarV() { alert("Viaje Agendado"); ir('home'); }
        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALCON Logistics - Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --rojo: #e63946; --azul: #2b2d42; --fondo: #f8f9fa; --blanco: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); margin: 0; color: var(--azul); display: flex; flex-direction: column; }

        /* Sidebar Adaptable */
        .sidebar { 
            width: 260px; background: var(--blanco); height: 100vh; position: fixed; 
            border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 1000;
        }
        .logo { padding: 25px; text-align: center; color: var(--rojo); font-size: 22px; font-weight: bold; border-bottom: 1px solid #eee; }
        .sidebar a { padding: 15px 25px; color: var(--azul); text-decoration: none; cursor: pointer; border-left: 5px solid transparent; display: flex; align-items: center; gap: 10px; }
        .sidebar a.active { background: #fff0f1; color: var(--rojo); border-left: 5px solid var(--rojo); font-weight: bold; }

        .main { margin-left: 260px; padding: 20px; width: calc(100% - 260px); min-height: 100vh; }
        .sec { display: none; }
        .sec.active { display: block; }

        /* Tarjetas y Botones */
        .card-calc { background: var(--azul); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        input, select, .btn { padding: 12px; border-radius: 10px; border: none; font-size: 16px; width: 100%; }
        .btn { background: var(--rojo); color: white; cursor: pointer; font-weight: bold; }
        
        /* BOTÓN DE BASURA MÁS GRANDE PARA CELULAR */
        .btn-trash { background: #dc3545; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; min-width: 45px; }

        .grid-unidades { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card-u { background: white; border-radius: 15px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .u-img { width: 100%; height: 130px; object-fit: contain; padding: 10px; }

        /* --- ARREGLO PARA QUE EL HISTORIAL SE VEA EN CELULAR --- */
        .contenedor-tabla {
            width: 100%;
            overflow-x: auto; /* Esto permite deslizar a la derecha en el cel */
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tabla-hist { width: 100%; border-collapse: collapse; min-width: 400px; } /* Min-width obliga a que el botón no se aplaste */
        .tabla-hist th, .tabla-hist td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; justify-content: center; border-right: none; }
            .sidebar a { padding: 12px; font-size: 13px; border-left: none; }
            .main { margin-left: 0; width: 100%; padding: 15px; }
            .inputs { grid-template-columns: 1fr; }
            .grid-unidades { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ALCON</div>
        <a id="n-home" onclick="nav('home')" class="active"><i class="fas fa-home"></i> Inicio</a>
        <a id="n-cal" onclick="nav('cal')"><i class="fas fa-calendar"></i> Agenda</a>
        <a id="n-hist" onclick="nav('hist')"><i class="fas fa-history"></i> Historial</a>
    </div>

    <div class="main">
        <div id="s-home" class="sec active">
            <div class="card-calc">
                <h3>Cotizador ALCON</h3>
                <div class="inputs">
                    <select id="tarifa">
                        <option value="14.21">Tráiler ($14.21/km)</option>
                        <option value="4.73">3.5T ($4.73/km)</option>
                        <option value="2.96">1.5T ($2.96/km)</option>
                    </select>
                    <input type="text" id="ori" placeholder="Origen">
                    <input type="text" id="des" placeholder="Destino">
                    <button class="btn" onclick="calcular()">Calcular</button>
                </div>
                <div id="res-box" style="display:none; padding:15px; background:rgba(255,255,255,0.1); border-radius:10px;">
                    <div id="res-info"></div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn" style="background:#25d366;" onclick="enviarWS()">WhatsApp</button>
                        <button class="btn" style="background:#4cc9f0; color:#000;" onclick="guardarLocal()">Guardar</button>
                    </div>
                </div>
            </div>

            <div class="grid-unidades">
                <div class="card-u">
                    <img src="https://images.unsplash.com/photo-1519003722824-194d4455a60c?w=400" class="u-img">
                    <div style="padding:15px"><h4>Tráiler 53'</h4><button class="btn" onclick="agendar('Tráiler')">Agendar</button></div>
                </div>
                <div class="card-u">
                    <img src="https://th.bing.com/th/id/OIP.nfBs-HTaNVy5UyPM1xw3swHaGC?w=210" class="u-img">
                    <div style="padding:15px"><h4>Camioneta 3.5T</h4><button class="btn" onclick="agendar('3.5 Ton')">Agendar</button></div>
                </div>
                <div class="card-u">
                    <img src="https://th.bing.com/th/id/OIP.xoN5FjI06m5JT4vgVj7sKwHaE8?w=239" class="u-img">
                    <div style="padding:15px"><h4>Camioneta 1.5T</h4><button class="btn" onclick="agendar('1.5 Ton')">Agendar</button></div>
                </div>
            </div>
        </div>

        <div id="s-hist" class="sec">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>Historial</h3>
                <button class="btn" style="width:auto; padding:8px 15px; font-size:12px; background:#666;" onclick="limpiarTodo()">Limpiar Todo</button>
            </div>
            <div class="contenedor-tabla">
                <table class="tabla-hist">
                    <thead><tr><th>Ruta</th><th>Costo</th><th>Acción</th></tr></thead>
                    <tbody id="lista-h"></tbody>
                </table>
            </div>
            <p style="font-size: 12px; color: #888; margin-top: 10px;">* En celular desliza la tabla a la derecha para ver el botón de borrar.</p>
        </div>

        <div id="s-cal" class="sec">
            <h3>Agenda <span id="u-nom"></span></h3>
            <div id="c-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin:15px 0;"></div>
            <input type="text" id="v-destino" placeholder="Destino Final" style="border:1px solid #ddd; padding:10px; width:100%;">
            <button class="btn" style="margin-top:10px;" onclick="confirmarV()">Confirmar</button>
        </div>
    </div>

    <script>
        let uAct = "", cData = null;

        function nav(id) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('s-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }

        async function calcular() {
            const o = document.getElementById('ori').value, d = document.getElementById('des').value, t = document.getElementById('tarifa').value;
            if(!o || !d) return alert("Escribe origen y destino");
            try {
                const rO = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${o}`), dO = await rO.json();
                const rD = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${d}`), dD = await rD.json();
                const R = 6371;
                const dLat = (dD[0].lat-dO[0].lat)*Math.PI/180, dLon = (dD[0].lon-dO[0].lon)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(dO[0].lat*Math.PI/180)*Math.cos(dD[0].lat*Math.PI/180)*Math.sin(dLon/2)**2;
                let km = (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1.25; 
                const tot = (km * t).toFixed(2);
                document.getElementById('res-box').style.display = 'block';
                document.getElementById('res-info').innerHTML = `<b>Distancia:</b> ${km.toFixed(1)} km <br> <b>Total: $${tot} MXN</b>`;
                cData = { o, d, tot };
            } catch(e) { alert("Ciudad no encontrada"); }
        }

        function guardarLocal() {
            const row = document.createElement('tr');
            row.innerHTML = `<td>${cData.o} - ${cData.d}</td><td>$${cData.tot}</td><td><button class="btn-trash" onclick="this.parentElement.parentElement.remove()"><i class="fas fa-trash"></i></button></td>`;
            document.getElementById('lista-h').appendChild(row);
            alert("Guardado en Historial");
        }

        function limpiarTodo() { if(confirm("¿Borrar todo el historial?")) document.getElementById('lista-h').innerHTML = ""; }

        function enviarWS() {
            const msg = `*ALCON LOGISTICS*%0AOrigen: ${cData.o}%0ADestino: ${cData.d}%0A*Total: $${cData.tot}*`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function agendar(n) { uAct = n; document.getElementById('u-nom').innerText = n; nav('cal'); renderCal(); }
        function renderCal() {
            const g = document.getElementById('c-grid'); g.innerHTML = "";
            for(let i=1; i<=31; i++) g.innerHTML += `<div style="padding:10px; border:1px solid #eee; text-align:center;" onclick="this.style.background='#e63946'; this.style.color='white';">${i}</div>`;
        }
        function confirmarV() { alert("Viaje Agendado"); nav('home'); }
    </script>
</body>
</html>

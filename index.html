<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALCON Logistics - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --rojo: #e63946; --azul: #2b2d42; --fondo: #f8f9fa; --blanco: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); margin: 0; color: var(--azul); display: flex; flex-direction: column; }

        /* Sidebar - Responsivo */
        .sidebar { 
            width: 260px; background: var(--blanco); height: 100vh; position: fixed; 
            border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 1000;
        }
        .logo { padding: 25px; text-align: center; color: var(--rojo); font-size: 22px; font-weight: bold; border-bottom: 1px solid #eee; }
        .sidebar a { padding: 15px 25px; color: var(--azul); text-decoration: none; cursor: pointer; border-left: 5px solid transparent; display: flex; align-items: center; gap: 10px; }
        .sidebar a.active { background: #fff0f1; color: var(--rojo); border-left: 5px solid var(--rojo); font-weight: bold; }

        /* Contenido */
        .main { margin-left: 260px; padding: 30px; width: calc(100% - 260px); min-height: 100vh; }
        .sec { display: none; }
        .sec.active { display: block; }

        /* Tarjetas */
        .card-calc { background: var(--azul); color: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        input, select, .btn { padding: 12px; border-radius: 10px; border: none; font-size: 16px; width: 100%; }
        .btn { background: var(--rojo); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .grid-unidades { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card-u { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .u-img { width: 100%; height: 160px; object-fit: contain; padding: 15px; }
        .u-body { padding: 15px; }
        .u-hist { padding: 15px; background: #fafafa; border-top: 1px solid #eee; font-size: 0.85em; max-height: 100px; overflow-y: auto; }

        /* Media Query para Celular */
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; justify-content: center; border-right: none; border-bottom: 1px solid #ddd; }
            .sidebar a { padding: 10px; font-size: 13px; border-left: none; border-bottom: 3px solid transparent; }
            .sidebar a.active { border-bottom: 3px solid var(--rojo); background: none; }
            .main { margin-left: 0; width: 100%; padding: 15px; }
            .inputs { grid-template-columns: 1fr; }
            .grid-unidades { grid-template-columns: 1fr; }
        }

        /* Calendario */
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .day { padding: 10px; border: 1px solid #eee; text-align: center; cursor: pointer; border-radius: 8px; }
        .day.sel { background: var(--rojo); color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ALCON LOGISTICS</div>
        <a id="n-home" onclick="nav('home')" class="active"><i class="fas fa-home"></i> Inicio</a>
        <a id="n-cal" onclick="nav('cal')"><i class="fas fa-calendar"></i> Agenda</a>
        <a id="n-hist" onclick="nav('hist')"><i class="fas fa-history"></i> Historial</a>
    </div>

    <div class="main">
        <div id="s-home" class="sec active">
            <div class="card-calc">
                <h3><i class="fas fa-calculator"></i> Cotizador ALCON</h3>
                <div class="inputs">
                    <select id="tarifa">
                        <option value="14.21">Tráiler ($14.21/km)</option>
                        <option value="4.73">Camioneta 3.5T ($4.73/km)</option>
                        <option value="2.96">Camioneta 1.5T ($2.96/km)</option>
                    </select>
                    <input type="text" id="ori" placeholder="Ciudad Origen">
                    <input type="text" id="des" placeholder="Ciudad Destino">
                    <button class="btn" onclick="calcular()">Calcular Ruta</button>
                </div>
                <div id="res-box" style="display:none; padding:15px; background:rgba(255,255,255,0.1); border-radius:15px; border:1px solid #4cc9f0;">
                    <div id="res-info"></div>
                    <button class="btn" style="background:#25d366; margin-top:10px;" onclick="enviarWS()"><i class="fab fa-whatsapp"></i> Enviar Cotización</button>
                </div>
            </div>

            <div class="grid-unidades">
                <div class="card-u">
                    <img src="https://images.unsplash.com/photo-1519003722824-194d4455a60c?w=400" class="u-img">
                    <div class="u-body"><h4>Tráiler Caja Seca</h4><button class="btn" onclick="agendar('Tráiler')">Agendar Viaje</button></div>
                    <div class="u-hist" id="h1">Sin viajes.</div>
                </div>
                <div class="card-u">
                    <img src="https://th.bing.com/th/id/OIP.nfBs-HTaNVy5UyPM1xw3swHaGC?w=210" class="u-img">
                    <div class="u-body"><h4>Camioneta 3.5 Ton</h4><button class="btn" onclick="agendar('3.5 Ton')">Agendar Viaje</button></div>
                    <div class="u-hist" id="h2">Sin viajes.</div>
                </div>
                <div class="card-u">
                    <img src="https://th.bing.com/th/id/OIP.xoN5FjI06m5JT4vgVj7sKwHaE8?w=239" class="u-img">
                    <div class="u-body"><h4>Camioneta 1.5 Ton</h4><button class="btn" onclick="agendar('1.5 Ton')">Agendar Viaje</button></div>
                    <div class="u-hist" id="h3">Sin viajes.</div>
                </div>
            </div>
        </div>

        <div id="s-cal" class="sec">
            <h3>Programar para: <span id="u-nom"></span></h3>
            <div class="days" id="c-grid"></div>
            <div style="margin-top:20px; background:white; padding:20px; border-radius:15px;">
                <p>Fecha: <b id="f-txt">26 de Marzo</b></p>
                <input type="text" id="v-destino" placeholder="Destino Final" style="border: 1px solid #ddd; margin-bottom:10px;">
                <button class="btn" onclick="confirmarV()">Guardar Registro</button>
            </div>
        </div>

        <div id="s-hist" class="sec">
            <h3>Historial de Cotizaciones</h3>
            <div id="lista-h" style="background:white; padding:15px; border-radius:15px;">Aún no hay rutas guardadas.</div>
        </div>
    </div>

    <script>
        let uAct = "", fAct = "26 de Marzo", cData = null;

        function nav(id) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById('s-'+id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }

        async function calcular() {
            const o = document.getElementById('ori').value, d = document.getElementById('des').value, t = document.getElementById('tarifa').value;
            if(!o || !d) return alert("Escribe origen y destino");
            try {
                const rO = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${o}`), dO = await rO.json();
                const rD = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${d}`), dD = await rD.json();
                const R = 6371;
                const dLat = (dD[0].lat-dO[0].lat)*Math.PI/180, dLon = (dD[0].lon-dO[0].lon)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(dO[0].lat*Math.PI/180)*Math.cos(dD[0].lat*Math.PI/180)*Math.sin(dLon/2)**2;
                let km = (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1.25; 
                const tot = (km * t).toFixed(2);
                document.getElementById('res-box').style.display = 'block';
                document.getElementById('res-info').innerHTML = `<b>Distancia:</b> ${km.toFixed(1)} km <br> <b>Total: $${tot} MXN</b>`;
                cData = { o, d, tot, km: km.toFixed(1) };
                
                // Guardar en historial automáticamente
                const h = document.getElementById('lista-h');
                if(h.innerText.includes("Aún no")) h.innerHTML = "";
                h.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;">${o} a ${d} - $${tot}</div>`;
            } catch(e) { alert("Error al buscar ciudades"); }
        }

        function enviarWS() {
            const msg = `*ALCON LOGISTICS*%0A📍 Origen: ${cData.o}%0A🏁 Destino: ${cData.d}%0A🛣️ Distancia: ${cData.km} km%0A💰 *Total: $${cData.tot} MXN*`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function agendar(n) { uAct = n; document.getElementById('u-nom').innerText = n; nav('cal'); render(); }
        function render() {
            const g = document.getElementById('c-grid'); g.innerHTML = "";
            for(let i=1; i<=31; i++) g.innerHTML += `<div class="day ${i===26?'sel':''}" onclick="sel(${i},this)">${i}</div>`;
        }
        function sel(d,e) { document.querySelectorAll('.day').forEach(x=>x.classList.remove('sel')); e.classList.add('sel'); fAct = d+" de Marzo"; document.getElementById('f-txt').innerText=fAct; }
        
        function confirmarV() {
            const ds = document.getElementById('v-destino').value;
            if(!ds) return alert("Escribe el destino");
            const bId = uAct === 'Tráiler' ? 'h1' : (uAct === '3.5 Ton' ? 'h2' : 'h3');
            const box = document.getElementById(bId);
            if(box.innerText.includes("Sin viajes")) box.innerHTML = "";
            box.innerHTML += `<div><b>${fAct}:</b> ${ds}</div>`;
            alert("¡Viaje agendado!"); nav('home');
        }
        render();
    </script>
</body>
</html>
